name: Deploy Landing to GitHub Pages

on:
  push:
    branches: [main]
    paths: [landing/**]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: landing
        run: npm ci

      - name: Generate static site
        working-directory: landing
        env:
          NUXT_APP_BASE_URL: /claude_agent_teams_ui/
          NUXT_PUBLIC_SITE_URL: https://777genius.github.io/claude_agent_teams_ui
          NUXT_PUBLIC_GITHUB_REPO: 777genius/claude_agent_teams_ui
        run: npx nuxt generate

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: landing/.output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
